<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Biosphere Zero — Walkthrough</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#fff;font-family:'JetBrains Mono','SF Mono',Menlo,monospace;overflow:hidden}
  #info{position:fixed;top:12px;left:12px;background:rgba(8,12,18,.7);padding:12px 16px;border-radius:4px;border:1px solid rgba(255,206,94,.2);font-size:12px;line-height:1.6;pointer-events:none;z-index:5;letter-spacing:.5px}
  #info b{color:#ffce5e;font-size:14px}
  #crosshair{position:fixed;left:50%;top:50%;width:8px;height:8px;border:1px solid rgba(255,255,255,.6);border-radius:50%;background:rgba(255,206,94,.3);transform:translate(-50%,-50%);pointer-events:none;z-index:5}
  #hint{position:fixed;left:50%;top:60%;transform:translateX(-50%);background:rgba(20,28,40,.95);color:#ffce5e;padding:8px 18px;border:1px solid #ffce5e;border-radius:2px;font-weight:600;font-size:13px;letter-spacing:2px;display:none;pointer-events:none;z-index:6;text-transform:uppercase;box-shadow:0 0 24px rgba(255,206,94,.3)}
  #start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);font-size:18px;cursor:pointer;z-index:10}
  #start b{display:block;font-size:38px;margin-bottom:14px;color:#ffce5e;letter-spacing:6px}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#666;font-size:13px;z-index:20;letter-spacing:2px}
  /* Sci-fi modal */
  #modal{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(20,30,45,.55) 0%,rgba(0,0,0,.92) 80%);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(6px)}
  #modalBox{background:linear-gradient(180deg,rgba(15,22,30,.98),rgba(8,12,18,.98));border:1px solid rgba(255,206,94,.35);border-radius:2px;padding:24px 30px;min-width:480px;max-width:640px;color:#cdd;box-shadow:0 0 80px rgba(255,206,94,.15), inset 0 1px 0 rgba(255,255,255,.04);position:relative}
  #modalBox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#ffce5e 50%,transparent);opacity:.6}
  #modalBox::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,206,94,.3) 50%,transparent)}
  #modalTitle{margin:0 0 6px 0;color:#ffce5e;font-size:14px;letter-spacing:8px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:10px}
  #modalTitle::before{content:'◆';color:#ffce5e;font-size:10px}
  #modalSub{color:#7a8290;font-size:11px;letter-spacing:2px;margin-bottom:24px;text-transform:uppercase}
  #modalContent{margin:18px 0;position:relative}
  /* Scanline overlay */
  #modalContent::after{content:'';position:absolute;inset:-4px;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,206,94,.03) 0px,rgba(255,206,94,.03) 1px,transparent 1px,transparent 3px);mix-blend-mode:overlay}
  #modalClose{margin-top:18px;padding:8px 22px;border:1px solid #2a3038;background:transparent;color:#888;cursor:pointer;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-family:inherit}
  #modalClose:hover{border-color:#ffce5e;color:#ffce5e}
  /* Buttons */
  .game-btn{display:inline-block;padding:12px 22px;margin:4px;border:1px solid #2a3038;background:rgba(15,20,28,.8);color:#cdd;cursor:pointer;font-size:13px;min-width:48px;letter-spacing:2px;text-transform:uppercase;font-family:inherit;transition:all .15s}
  .game-btn:hover{border-color:#ffce5e;color:#ffce5e;background:rgba(40,32,18,.6);box-shadow:0 0 14px rgba(255,206,94,.2)}
  .game-btn.active{background:rgba(196,122,44,.3);border-color:#ffce5e;color:#ffce5e}
  .game-btn.lit{background:linear-gradient(180deg,#ffce5e,#c47a2c);color:#1a1208;border-color:#ffce5e;font-weight:700;box-shadow:0 0 20px rgba(255,206,94,.4)}
  /* Wiring */
  .wire-cont{display:flex;justify-content:space-between;padding:18px;background:rgba(8,12,18,.5);border:1px solid #1a1f26}
  .wire-col{display:flex;flex-direction:column;gap:10px;width:48%}
  .wire{height:14px;background:#1a1f26;border-radius:1px;cursor:pointer;position:relative;border:1px solid rgba(255,255,255,.05);transition:all .15s;display:flex;align-items:center;padding:0 14px;color:transparent;font-size:11px;letter-spacing:2px}
  .wire:hover{transform:scale(1.04)}
  .wire.connected{background:linear-gradient(90deg,var(--wire-color),var(--wire-color));box-shadow:0 0 14px var(--wire-color);color:#fff}
  .wire.selected{outline:2px solid #ffce5e;outline-offset:2px}
  /* Keypad */
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:260px;margin:18px auto;padding:14px;background:rgba(8,12,18,.6);border:1px solid #1a1f26}
  .keypad button{padding:18px;font-size:20px;background:linear-gradient(180deg,#1a1f26,#0e1218);color:#ffce5e;border:1px solid #2a3038;cursor:pointer;font-family:inherit;font-weight:700;transition:all .1s}
  .keypad button:hover{background:linear-gradient(180deg,#2a3038,#1a1f26);box-shadow:inset 0 0 12px rgba(255,206,94,.3)}
  .keypad button:active{transform:scale(.95)}
  .pin-display{font-size:32px;letter-spacing:18px;color:#ffce5e;text-align:center;font-weight:700;padding:18px;background:rgba(8,12,18,.7);border:1px solid #2a3038;margin-bottom:10px;font-family:inherit;text-shadow:0 0 16px rgba(255,206,94,.6)}
  /* Swipe */
  .swipe-track{position:relative;width:100%;height:100px;background:linear-gradient(180deg,#0a0e14,#14181f);border:1px solid #2a3038;margin-top:14px;overflow:hidden}
  .swipe-track::after{content:'→ → →';position:absolute;top:42px;left:60%;color:rgba(255,206,94,.15);font-size:24px;letter-spacing:8px}
  .swipe-card{position:absolute;left:6px;top:18px;width:70px;height:62px;background:linear-gradient(135deg,#c47a2c,#8b5722);border:1px solid #ffce5e;cursor:grab;user-select:none;display:flex;align-items:center;justify-content:center;color:#1a1208;font-weight:700;font-size:13px;letter-spacing:2px;box-shadow:0 0 18px rgba(255,206,94,.3)}
  /* Calibrate */
  .calib-bar{position:relative;width:100%;height:36px;background:linear-gradient(180deg,#0a0e14,#14181f);border:1px solid #2a3038;margin:18px 0;overflow:hidden}
  .calib-zone{position:absolute;left:42%;width:16%;height:100%;background:linear-gradient(180deg,rgba(90,205,107,.4),rgba(90,205,107,.15));border-left:1px solid #5acd6b;border-right:1px solid #5acd6b}
  .calib-needle{position:absolute;top:0;width:5px;height:100%;background:linear-gradient(180deg,#ffce5e,#c47a2c);box-shadow:0 0 12px rgba(255,206,94,.7)}
  /* Status text & banner */
  .status{display:inline-block;padding:3px 10px;background:#5acd6b;color:#0a0a0a;border-radius:1px;font-size:11px;margin-left:6px;font-weight:700;letter-spacing:2px}
  .status.fail{background:#e34c3a;color:#fff}
  .sabotage-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(180deg,rgba(180,30,20,.95),rgba(120,15,10,.7));color:#fff;text-align:center;padding:14px;font-weight:700;font-size:15px;letter-spacing:4px;text-transform:uppercase;z-index:40;display:none;border-bottom:2px solid #ff3020;box-shadow:0 0 30px rgba(255,50,30,.5)}
  .sabotage-banner.show{display:block;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
  /* Task header decorations */
  .task-hud{font-size:10px;letter-spacing:3px;color:#5acd6b;margin-bottom:6px}
  .task-hud-row{display:flex;justify-content:space-between;color:#7a8290;font-size:10px;letter-spacing:2px;margin-bottom:14px;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid rgba(255,206,94,.1)}
</style>
</head>
<body>
<div id="loading">scene laden…</div>
<div id="info" style="display:none">
  <b>Biosphere Zero</b>
  WASD = lopen · Shift = sprint<br>
  Space/Ctrl = omhoog/omlaag<br>
  E / klik = interact · Esc = release
</div>
<div id="crosshair" style="display:none"></div>
<div id="hint"></div>
<div id="start" style="display:none">
  <div style="text-align:center">
    <b>Biosphere Zero</b>
    klik om te starten
  </div>
</div>

<div id="sabBanner" class="sabotage-banner"></div>

<div id="modal">
  <div id="modalBox">
    <h2 id="modalTitle">Task</h2>
    <div class="sub" id="modalSub">…</div>
    <div id="modalContent"></div>
    <button id="modalClose">Sluiten</button>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {PointerLockControls} from 'three/addons/controls/PointerLockControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);
scene.fog = new THREE.FogExp2(0x05060a, 0.045);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1.7, 6);

const renderer = new THREE.WebGLRenderer({antialias:false, powerPreference:'low-power'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(0.6);   // very low res for safety
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.NoToneMapping;  // unlit mode, no tone mapping
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);
// No scene lights — using MeshBasicMaterial (unlit)
scene.add(camera);

const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

const startEl = document.getElementById('start');
const infoEl = document.getElementById('info');
const crossEl = document.getElementById('crosshair');
const loadEl = document.getElementById('loading');
const hintEl = document.getElementById('hint');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalSub = document.getElementById('modalSub');
const modalContent = document.getElementById('modalContent');
const modalClose = document.getElementById('modalClose');
const sabBanner = document.getElementById('sabBanner');

modalClose.addEventListener('click', () => closeModal());

function openModal(title, sub, contentBuilder){
  modalTitle.textContent = title;
  modalSub.textContent = sub;
  modalContent.innerHTML = '';
  contentBuilder(modalContent);
  modal.style.display = 'flex';
}
function closeModal(){
  modal.style.display = 'none';
  if (controls && !controls.isLocked) {
    setTimeout(() => controls.lock().catch(()=>{}), 50);
  }
}

controls.addEventListener('lock', () => { startEl.style.display='none'; });
controls.addEventListener('unlock', () => {
  if (modal.style.display !== 'flex') startEl.style.display='flex';
});

const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE' && controls.isLocked && currentInteractable) {
    handleInteract(currentInteractable);
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
startEl.addEventListener('click', () => controls.lock());

const interactables = []; // {obj, kind, data}
const doors = []; // {id, panelL, panelR, openOffsetL, openOffsetR, button, isOpen, lerp}
const lightObjects = [];
const completedTasks = new Set();
let activeSabotage = null;

const loader = new GLTFLoader();
loader.load('biosphere.glb',
  gltf => {
    const crew = gltf.scene.getObjectByName('CREW_Spawn');
    if (crew && crew.parent) crew.parent.remove(crew);
    // ULTRA-LITE MODE: collect lights & meshes first (don't mutate during traverse)
    const lights = [];
    const meshes = [];
    gltf.scene.traverse(o => {
      if (o.isLight) lights.push(o);
      else if (o.isMesh) meshes.push(o);
    });
    // Remove lights after traverse
    for (const L of lights) if (L.parent) L.parent.remove(L);

    const matCache = new Map();
    for (const o of meshes) {
      try {
        if (!o.material) continue;
        const ms = Array.isArray(o.material) ? o.material : [o.material];
        const replaced = ms.map(m => {
          if (!m) return new THREE.MeshBasicMaterial({color:0x555555});
          if (matCache.has(m.uuid)) return matCache.get(m.uuid);
          let col = new THREE.Color(0x555555);
          if (m.emissive && (m.emissive.r + m.emissive.g + m.emissive.b) > 0.05) {
            col = m.emissive.clone();
          } else if (m.color) {
            col = m.color.clone();
            col.multiplyScalar(1.6);
          }
          const opacity = (m.opacity !== undefined && m.opacity < 1) ? m.opacity : 1.0;
          const newMat = new THREE.MeshBasicMaterial({
            color: col,
            transparent: opacity < 1,
            opacity: opacity,
            fog: true,
          });
          matCache.set(m.uuid, newMat);
          return newMat;
        });
        o.material = Array.isArray(o.material) ? replaced : replaced[0];
        o.castShadow = false; o.receiveShadow = false;
        o.frustumCulled = true;
      } catch (err) {
        console.warn('material convert failed for', o.name, err);
      }
    }
    scene.add(gltf.scene);
    indexInteractables(gltf.scene);
    // Build flat list of meshes for distance culling
    sceneMeshes.length = 0;
    gltf.scene.traverse(o => { if (o.isMesh) sceneMeshes.push(o); });
    console.log('total meshes in scene:', sceneMeshes.length);
    loadEl.style.display='none';
    infoEl.style.display='block';
    crossEl.style.display='block';
    startEl.style.display='flex';
  },
  xhr => {
    if (xhr.lengthComputable) {
      loadEl.textContent = `scene laden… ${Math.round(xhr.loaded/xhr.total*100)}%`;
    }
  },
  err => {
    loadEl.textContent = 'fout bij laden van biosphere.glb';
    console.error(err);
  }
);

function indexInteractables(root){
  const doorMap = {};
  root.traverse(obj => {
    if (!obj.isMesh) return;
    const n = obj.name || '';
    const ud = obj.userData || {};
    // Task panels — Screen meshes (interactable)
    if (n.includes('_Screen') && n.startsWith('TASK_')) {
      interactables.push({obj, kind:'task', data:{type: ud.task_type || 'card_swipe', id:n}});
    }
    // Vents — Base meshes
    if (n.includes('_Base') && n.startsWith('VENT_')) {
      interactables.push({obj, kind:'vent', data:{id: ud.vent_id, link: ud.vent_link, dome: ud.vent_dome}});
    }
    // Doors — Button
    if (n.startsWith('DOOR_') && n.endsWith('_Button')) {
      interactables.push({obj, kind:'door', data:{id: ud.door_id || n.replace('_Button','')}});
    }
    // Door panels (for animating)
    if (n.startsWith('DOOR_') && (n.endsWith('_PanelL') || n.endsWith('_PanelR'))) {
      const did = ud.door_id || n.split('_').slice(0,-1).join('_');
      if (!doorMap[did]) doorMap[did] = {id:did, panelL:null, panelR:null, panelL_origPos:null, panelR_origPos:null, panelL_offset:[-0.7,0,0], panelR_offset:[0.7,0,0], isOpen:false, lerp:0};
      const isL = n.endsWith('_PanelL');
      if (isL) {
        doorMap[did].panelL = obj;
        doorMap[did].panelL_origPos = obj.position.clone();
        if (ud.door_open_offset) doorMap[did].panelL_offset = ud.door_open_offset;
      } else {
        doorMap[did].panelR = obj;
        doorMap[did].panelR_origPos = obj.position.clone();
        if (ud.door_open_offset) doorMap[did].panelR_offset = ud.door_open_offset;
      }
    }
    // Sabotage terminals
    if (n.startsWith('SAB_') && n.endsWith('_Base')) {
      interactables.push({obj, kind:'sabotage', data:{type: ud.sabotage_type || 'unknown'}});
    }
    // Lights collection (for electrical sabotage)
    if (obj.isLight || obj.material?.emissive) {
      lightObjects.push(obj);
    }
  });
  for (const did of Object.keys(doorMap)) doors.push(doorMap[did]);
  console.log(`interactables: ${interactables.length}, doors: ${doors.length}`);
}

const raycaster = new THREE.Raycaster();
let currentInteractable = null;
function pickInteractable(){
  const origin = camera.position.clone();
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  raycaster.set(origin, dir);
  raycaster.far = 3.5;
  // Cast against just the interactable meshes
  const meshes = interactables.map(i => i.obj);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length > 0) {
    const obj = hits[0].object;
    const inter = interactables.find(i => i.obj === obj);
    return inter || null;
  }
  return null;
}

function showHint(text){
  hintEl.textContent = text;
  hintEl.style.display = 'block';
}
function hideHint(){ hintEl.style.display = 'none'; }

document.addEventListener('mousedown', e => {
  if (!controls.isLocked) return;
  if (e.button === 0 && currentInteractable) {
    handleInteract(currentInteractable);
  }
});

function handleInteract(inter){
  if (inter.kind === 'door') {
    toggleDoor(inter.data.id);
  } else if (inter.kind === 'vent') {
    openVentModal(inter.data);
  } else if (inter.kind === 'task') {
    openTaskModal(inter.data);
  } else if (inter.kind === 'sabotage') {
    triggerSabotage(inter.data.type);
  }
}

function toggleDoor(id){
  const d = doors.find(x => x.id === id);
  if (!d) return;
  d.isOpen = !d.isOpen;
}

function openVentModal(data){
  controls.unlock();
  openModal('VENTILATIESCHACHT', `Locatie: ${data.dome || 'onbekend'} — link: ${data.link || '?'}`, root => {
    const p = document.createElement('p');
    p.textContent = 'Springen naar gekoppelde ventilatieopening:';
    root.appendChild(p);
    const btn = document.createElement('button');
    btn.className = 'game-btn lit';
    btn.textContent = `→ ${data.link}`;
    btn.addEventListener('click', () => {
      // Teleport player to linked vent
      const target = interactables.find(i => i.kind==='vent' && i.data.id === data.link);
      if (target) {
        const w = new THREE.Vector3();
        target.obj.getWorldPosition(w);
        const obj = controls.getObject();
        obj.position.set(w.x, 1.7, w.y === undefined ? obj.position.z : w.z);
        // actually three uses Y-up; vents in Blender at z, but exported yup => world Y = blender z
        obj.position.set(w.x, 1.7, w.z); // ensure
      }
      closeModal();
    });
    root.appendChild(btn);
  });
}

// ====== TASK MINI-GAMES ======
function openTaskModal(data){
  controls.unlock();
  const type = data.type || 'card_swipe';
  const titles = {card_swipe:'AUTHENTICATIE', wiring:'WIRING REPAIR', sequence:'SEQUENCE LOCK', keypad:'KEYPAD ACCESS', calibrate:'CALIBRATION', align:'ALIGNMENT'};
  const subs = {card_swipe:'swipe id-pass', wiring:'verbind matchende circuits', sequence:'voer pin in', keypad:'voer pin in', calibrate:'stop binnen target zone', align:'rotate naar coordinaat'};
  openModal(titles[type] || 'TAAK', subs[type] || '', root => {
    // Sci-fi HUD header
    const hud = document.createElement('div'); hud.className='task-hud-row';
    hud.innerHTML = `<span>SYS://${type.toUpperCase()}</span><span>${(data.id||'TASK_X').slice(0,18)}</span><span style="color:#5acd6b">● ONLINE</span>`;
    root.appendChild(hud);
    if (type==='card_swipe') buildCardSwipe(root, data);
    else if (type==='wiring') buildWiring(root, data);
    else if (type==='sequence' || type==='keypad') buildKeypad(root, data);
    else if (type==='calibrate') buildCalibrate(root, data);
    else if (type==='align') buildAlign(root, data);
    else buildCardSwipe(root, data);
  });
}

function buildCardSwipe(root, data){
  const desc = document.createElement('div'); desc.textContent='Sleep de pas van links naar rechts op natuurlijke snelheid.';
  desc.style.color='#aaa'; desc.style.fontSize='13px'; root.appendChild(desc);
  const track = document.createElement('div'); track.className='swipe-track'; root.appendChild(track);
  const card = document.createElement('div'); card.className='swipe-card'; card.textContent='ID'; card.style.textAlign='center'; card.style.lineHeight='50px'; card.style.color='#000'; card.style.fontWeight='700';
  track.appendChild(card);
  let dragging=false, startX=0, startMs=0, lastX=0;
  card.addEventListener('mousedown', e => { dragging=true; startX=e.clientX-card.offsetLeft; startMs=Date.now(); });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const x = Math.max(0, Math.min(track.clientWidth-60, e.clientX-startX));
    card.style.left = x+'px'; lastX=x;
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return; dragging=false;
    const dx = lastX; const dt = (Date.now()-startMs)/1000;
    const speed = dx/dt;
    if (lastX > track.clientWidth - 80 && speed > 80 && speed < 400) {
      success(data, root);
    } else {
      const msg = document.createElement('div'); msg.textContent= speed > 400 ? 'Te snel — probeer opnieuw' : (speed < 80 ? 'Te langzaam' : 'Sleep helemaal naar rechts'); msg.style.color='#e34c3a'; msg.style.marginTop='6px';
      root.appendChild(msg); card.style.left='0';
      setTimeout(()=>msg.remove(), 1500);
    }
  });
}

function buildWiring(root, data){
  const colors = ['#ff4a3a','#5acd6b','#4aaee8','#ffce5e'];
  const labels = ['CIRCUIT.A','CIRCUIT.B','CIRCUIT.C','CIRCUIT.D'];
  const right = [...colors].map((c,i)=>({c,l:labels[i]}));
  right.sort(()=>Math.random()-0.5);
  let selected = null; const connections = {};
  const cont = document.createElement('div'); cont.className='wire-cont';
  const leftCol = document.createElement('div'); leftCol.className='wire-col';
  const rightCol = document.createElement('div'); rightCol.className='wire-col';
  colors.forEach((c,i) => {
    const w = document.createElement('div'); w.className='wire'; w.style.setProperty('--wire-color',c); w.style.background='#1a1f26'; w.dataset.color=c; w.textContent=labels[i];
    w.addEventListener('click', () => {
      if (selected) selected.classList.remove('selected');
      selected=w; w.classList.add('selected');
    });
    leftCol.appendChild(w);
  });
  right.forEach(({c,l}) => {
    const w = document.createElement('div'); w.className='wire'; w.style.setProperty('--wire-color',c); w.style.background='#1a1f26'; w.dataset.color=c; w.textContent=l;
    w.addEventListener('click', () => {
      if (!selected) return;
      if (selected.dataset.color === c) {
        selected.classList.add('connected'); w.classList.add('connected');
        selected.classList.remove('selected');
        selected.style.pointerEvents='none'; w.style.pointerEvents='none';
        connections[selected.dataset.color] = true;
        selected = null;
        if (Object.keys(connections).length === colors.length) success(data, root);
      } else {
        const bad = selected;
        bad.style.outline='2px solid #ff4a3a';
        setTimeout(()=>{ bad.style.outline=''; bad.classList.remove('selected'); selected=null; }, 380);
      }
    });
    rightCol.appendChild(w);
  });
  cont.appendChild(leftCol); cont.appendChild(rightCol);
  root.appendChild(cont);
}

function buildKeypad(root, data){
  const pin = String(Math.floor(1000 + Math.random()*9000));
  const display = document.createElement('div'); display.className='pin-display';
  display.textContent = '----';
  root.appendChild(display);
  const hint = document.createElement('div'); hint.innerHTML = `<span style="color:#5acd6b">►</span> PIN CODE: <span style="color:#ffce5e">${pin}</span>`; hint.style.color='#7a8290'; hint.style.fontSize='11px'; hint.style.letterSpacing='3px'; hint.style.textAlign='center'; hint.style.marginBottom='8px';
  root.appendChild(hint);
  const grid = document.createElement('div'); grid.className='keypad';
  let entered='';
  const enter = (n) => {
    entered += n;
    display.textContent = entered.padEnd(4,'-');
    if (entered.length === 4) {
      if (entered === pin) success(data, root);
      else {
        display.style.color='#ff4a3a';
        setTimeout(()=>{ entered=''; display.textContent='----'; display.style.color='#ffce5e'; }, 600);
      }
    }
  };
  for (let i=1; i<=9; i++) {
    const b = document.createElement('button'); b.textContent=i; b.addEventListener('click', ()=>enter(String(i))); grid.appendChild(b);
  }
  const empty = document.createElement('div'); grid.appendChild(empty);
  const zero = document.createElement('button'); zero.textContent='0'; zero.addEventListener('click', ()=>enter('0')); grid.appendChild(zero);
  const clr = document.createElement('button'); clr.textContent='⌫'; clr.addEventListener('click', ()=>{ entered=''; display.textContent='----'; }); grid.appendChild(clr);
  root.appendChild(grid);
}

function buildCalibrate(root, data){
  const bar = document.createElement('div'); bar.className='calib-bar';
  const zone = document.createElement('div'); zone.className='calib-zone';
  bar.appendChild(zone);
  const needle = document.createElement('div'); needle.className='calib-needle';
  bar.appendChild(needle);
  root.appendChild(bar);
  let pos=0, dir=1;
  const iv = setInterval(() => {
    pos += dir*1.5; if (pos > 100) {pos=100; dir=-1;} if (pos<0) {pos=0; dir=1;}
    needle.style.left = pos+'%';
  }, 16);
  const btnRow = document.createElement('div'); btnRow.style.textAlign='center';
  const stopBtn = document.createElement('button'); stopBtn.className='game-btn lit'; stopBtn.textContent='LOCK';
  stopBtn.addEventListener('click', () => {
    clearInterval(iv);
    if (pos >= 42 && pos <= 58) success(data, root);
    else {
      const m = document.createElement('div'); m.innerHTML='<span style="color:#ff4a3a">✕ OUT OF RANGE</span>'; m.style.color='#ff4a3a'; m.style.marginTop='10px'; m.style.fontSize='11px'; m.style.letterSpacing='2px';
      root.appendChild(m);
    }
  });
  btnRow.appendChild(stopBtn);
  root.appendChild(btnRow);
}

function buildAlign(root, data){
  const target = Math.floor(Math.random()*360);
  const display = document.createElement('div'); display.style.cssText='font-family:monospace;font-size:22px;color:#ffce5e;text-align:center;margin:14px 0';
  let current = 0;
  const update = () => { display.textContent = `Doel: ${target}° · Huidig: ${current}°`; };
  update();
  root.appendChild(display);
  const btnRow = document.createElement('div'); btnRow.style.textAlign='center';
  const minus = document.createElement('button'); minus.className='game-btn'; minus.textContent='◀ -10°';
  const plus = document.createElement('button'); plus.className='game-btn'; plus.textContent='+10° ▶';
  const lock = document.createElement('button'); lock.className='game-btn lit'; lock.textContent='LOCK';
  minus.onclick = () => { current = (current-10+360)%360; update(); };
  plus.onclick = () => { current = (current+10)%360; update(); };
  lock.onclick = () => {
    if (Math.abs(((current-target+540)%360)-180) > 175) success(data, root);
    else {
      const m = document.createElement('div'); m.textContent='Niet uitgelijnd'; m.style.color='#e34c3a'; m.style.marginTop='6px'; root.appendChild(m);
      setTimeout(()=>m.remove(), 1500);
    }
  };
  btnRow.appendChild(minus); btnRow.appendChild(lock); btnRow.appendChild(plus);
  root.appendChild(btnRow);
}

function success(data, root){
  completedTasks.add(data.id);
  root.innerHTML='';
  const msg = document.createElement('div');
  msg.innerHTML = '<div style="font-size:48px;text-align:center;color:#5acd6b">✓</div><div style="text-align:center;color:#5acd6b;font-size:18px">Taak voltooid</div>';
  root.appendChild(msg);
  setTimeout(closeModal, 900);
}

// ====== SABOTAGE ======
function triggerSabotage(type){
  if (type === 'reactor_meltdown') {
    activeSabotage = 'reactor';
    sabBanner.textContent = '⚠ REACTOR MELTDOWN — fix bij reactor binnen 60s';
    sabBanner.classList.add('show');
    setTimeout(() => clearSabotage(), 60000);
  } else if (type === 'electrical_off') {
    activeSabotage = 'electrical';
    sabBanner.textContent = '⚠ ELEKTRA UITGEVALLEN — fix bij elektrabord';
    sabBanner.classList.add('show');
    // dim all lights / emissives
    lightObjects.forEach(o => {
      if (o.isLight) o.userData._origEnergy = o.intensity, o.intensity = o.intensity * 0.1;
      if (o.material && o.material.emissiveIntensity !== undefined) {
        o.material.userData = o.material.userData || {};
        o.material.userData._origEmissive = o.material.emissiveIntensity;
        o.material.emissiveIntensity = o.material.emissiveIntensity * 0.1;
      }
    });
    setTimeout(() => clearSabotage(), 60000);
  } else if (type === 'oxygen_off') {
    activeSabotage = 'o2';
    sabBanner.textContent = '⚠ ZUURSTOF LEEG — fix bij water-zuivering';
    sabBanner.classList.add('show');
    setTimeout(() => clearSabotage(), 60000);
  }
}
function clearSabotage(){
  activeSabotage = null;
  sabBanner.classList.remove('show');
  lightObjects.forEach(o => {
    if (o.isLight && o.userData._origEnergy) o.intensity = o.userData._origEnergy;
    if (o.material && o.material.userData?._origEmissive !== undefined) {
      o.material.emissiveIntensity = o.material.userData._origEmissive;
    }
  });
}

const dir = new THREE.Vector3();
const right = new THREE.Vector3();
let last = performance.now();
let rayTick = 0;
const sceneMeshes = [];
let cullTick = 0;
const CULL_DIST_SQ = 35*35;     // hide anything more than 35m away from camera
const _meshWorld = new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - last) / 1000;
  last = now;

  if (controls.isLocked) {
    const speed = (keys.ShiftLeft || keys.ShiftRight ? 14 : 5) * dt;
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();
    right.crossVectors(dir, camera.up).normalize();
    const obj = controls.getObject();
    if (keys.KeyW) obj.position.addScaledVector(dir,  speed);
    if (keys.KeyS) obj.position.addScaledVector(dir, -speed);
    if (keys.KeyD) obj.position.addScaledVector(right,  speed);
    if (keys.KeyA) obj.position.addScaledVector(right, -speed);
    if (keys.Space) obj.position.y += speed;
    if (keys.ControlLeft || keys.ControlRight) obj.position.y -= speed;

    // Pick interactable (throttled — every 6 frames)
    rayTick = (rayTick + 1) % 6;
    const inter = (rayTick === 0) ? pickInteractable() : currentInteractable;
    if (inter !== currentInteractable) {
      currentInteractable = inter;
      if (inter) {
        const kindNames = {door:'Deur', vent:'Vent', task:'Taak', sabotage:'Sabotage'};
        showHint(`[E] ${kindNames[inter.kind] || inter.kind}`);
      } else hideHint();
    }
  }

  // Distance cull — process a chunk of meshes per frame
  if (sceneMeshes.length) {
    const camPos = camera.position;
    const chunkSize = 200;
    const start = cullTick * chunkSize;
    const end = Math.min(start + chunkSize, sceneMeshes.length);
    for (let i = start; i < end; i++) {
      const m = sceneMeshes[i];
      m.getWorldPosition(_meshWorld);
      const dx = _meshWorld.x - camPos.x;
      const dz = _meshWorld.z - camPos.z;
      m.visible = (dx*dx + dz*dz) < CULL_DIST_SQ;
    }
    cullTick = (cullTick + 1) % Math.ceil(sceneMeshes.length / chunkSize);
  }

  // Animate doors
  for (const d of doors) {
    const target = d.isOpen ? 1 : 0;
    d.lerp += (target - d.lerp) * Math.min(1, dt*5);
    if (d.panelL && d.panelL_origPos) {
      const o = Array.isArray(d.panelL_offset) ? d.panelL_offset : [-0.7, 0, 0];
      d.panelL.position.x = d.panelL_origPos.x + o[0]*d.lerp;
      d.panelL.position.z = d.panelL_origPos.z + o[1]*d.lerp;
    }
    if (d.panelR && d.panelR_origPos) {
      const o = Array.isArray(d.panelR_offset) ? d.panelR_offset : [0.7, 0, 0];
      d.panelR.position.x = d.panelR_origPos.x + o[0]*d.lerp;
      d.panelR.position.z = d.panelR_origPos.z + o[1]*d.lerp;
    }
  }

  renderer.render(scene, camera);
}
animate();
</script>
